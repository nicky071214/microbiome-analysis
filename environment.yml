name: microbiome-analysis
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  - numpy
  - pandas
  - pyyaml
  - scipy
  - scikit-learn
  - matplotlib
  - seaborn
  - snakemake-minimal
  - r-base=4.4
  - r-tidyverse
  - r-vegan
  - r-ape
  - r-cowplot
  - bioconductor-phyloseq
  - bioconductor-biostrings
  - pip
  - pip:
      - ripser
      - persim
